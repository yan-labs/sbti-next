<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Beveled rectangle + tracker triangle motif -->
  <!-- Outer beveled frame (clip-path corners) -->
  <polygon
    points="16,4 184,4 196,16 196,184 184,196 16,196 4,184 4,16"
    stroke="currentColor"
    stroke-width="1.5"
    fill="none"
    opacity="0.5"
  />
  <!-- Inner beveled rect -->
  <polygon
    points="28,14 172,14 186,28 186,172 172,186 28,186 14,172 14,28"
    stroke="currentColor"
    stroke-width="0.8"
    fill="none"
    opacity="0.3"
  />
  <!-- Corner rivets -->
  <rect x="4" y="4" width="6" height="6" fill="currentColor" opacity="0.7"/>
  <rect x="190" y="4" width="6" height="6" fill="currentColor" opacity="0.7"/>
  <rect x="4" y="190" width="6" height="6" fill="currentColor" opacity="0.7"/>
  <rect x="190" y="190" width="6" height="6" fill="currentColor" opacity="0.7"/>
  <!-- Tracker/scanner triangle (pointing up — Apex logo echo) -->
  <polygon
    points="100,52 138,130 62,130"
    stroke="currentColor"
    stroke-width="2"
    fill="none"
    opacity="0.8"
  />
  <!-- Triangle inner line (depth) -->
  <polygon
    points="100,66 126,118 74,118"
    stroke="currentColor"
    stroke-width="0.8"
    fill="none"
    opacity="0.4"
  />
  <!-- Slide arc (kinetic arc below triangle) -->
  <path
    d="M50,148 Q100,168 150,148"
    stroke="currentColor"
    stroke-width="1.5"
    fill="none"
    opacity="0.6"
  />
  <path
    d="M38,158 Q100,182 162,158"
    stroke="currentColor"
    stroke-width="1"
    fill="none"
    opacity="0.35"
  />
  <!-- Industrial tick marks on frame sides -->
  <line x1="96" y1="4" x2="96" y2="10" stroke="currentColor" stroke-width="1" opacity="0.5"/>
  <line x1="104" y1="4" x2="104" y2="10" stroke="currentColor" stroke-width="1" opacity="0.5"/>
  <line x1="96" y1="190" x2="96" y2="196" stroke="currentColor" stroke-width="1" opacity="0.5"/>
  <line x1="104" y1="190" x2="104" y2="196" stroke="currentColor" stroke-width="1" opacity="0.5"/>
  <line x1="4" y1="96" x2="10" y2="96" stroke="currentColor" stroke-width="1" opacity="0.5"/>
  <line x1="4" y1="104" x2="10" y2="104" stroke="currentColor" stroke-width="1" opacity="0.5"/>
  <line x1="190" y1="96" x2="196" y2="96" stroke="currentColor" stroke-width="1" opacity="0.5"/>
  <line x1="190" y1="104" x2="196" y2="104" stroke="currentColor" stroke-width="1" opacity="0.5"/>
</svg>
