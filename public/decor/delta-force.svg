<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Camo pattern / route line motif -->
  <!-- Camo blobs (irregular shapes suggesting camouflage) -->
  <ellipse cx="30" cy="30" rx="22" ry="14" fill="currentColor" opacity="0.08" transform="rotate(-20 30 30)"/>
  <ellipse cx="80" cy="15" rx="18" ry="10" fill="currentColor" opacity="0.06" transform="rotate(10 80 15)"/>
  <ellipse cx="160" cy="40" rx="24" ry="12" fill="currentColor" opacity="0.08" transform="rotate(-10 160 40)"/>
  <ellipse cx="20" cy="90" rx="16" ry="20" fill="currentColor" opacity="0.06" transform="rotate(5 20 90)"/>
  <ellipse cx="170" cy="110" rx="20" ry="14" fill="currentColor" opacity="0.07" transform="rotate(-15 170 110)"/>
  <ellipse cx="40" cy="160" rx="22" ry="13" fill="currentColor" opacity="0.08" transform="rotate(20 40 160)"/>
  <ellipse cx="140" cy="170" rx="25" ry="14" fill="currentColor" opacity="0.06" transform="rotate(-5 140 170)"/>
  <ellipse cx="100" cy="185" rx="16" ry="10" fill="currentColor" opacity="0.07" transform="rotate(15 100 185)"/>
  <!-- Tactical route line (dashed path from top to bottom) -->
  <path
    d="M100,10 L100,40 L140,60 L140,90 L100,110 L60,130 L60,160 L100,190"
    stroke="currentColor"
    stroke-width="1.5"
    stroke-dasharray="6 4"
    fill="none"
    opacity="0.6"
  />
  <!-- Waypoint dots on route -->
  <circle cx="100" cy="40" r="3" fill="currentColor" opacity="0.7"/>
  <circle cx="140" cy="75" r="3" fill="currentColor" opacity="0.7"/>
  <circle cx="80" cy="120" r="3" fill="currentColor" opacity="0.7"/>
  <circle cx="60" cy="160" r="3" fill="currentColor" opacity="0.7"/>
  <!-- Compass rose (simplified) -->
  <line x1="100" y1="86" x2="100" y2="94" stroke="currentColor" stroke-width="1" opacity="0.5"/>
  <line x1="96" y1="90" x2="104" y2="90" stroke="currentColor" stroke-width="1" opacity="0.5"/>
  <!-- Briefing stamp border -->
  <rect x="6" y="6" width="188" height="188" stroke="currentColor" stroke-width="1" stroke-dasharray="8 4" fill="none" opacity="0.25"/>
</svg>
