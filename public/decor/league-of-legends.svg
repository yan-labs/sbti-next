<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Gothic emblem / rune diamond motif -->
  <!-- Outer diamond frame -->
  <polygon
    points="100,8 192,100 100,192 8,100"
    stroke="currentColor"
    stroke-width="1.5"
    fill="none"
    opacity="0.6"
  />
  <!-- Inner diamond -->
  <polygon
    points="100,28 172,100 100,172 28,100"
    stroke="currentColor"
    stroke-width="1"
    fill="none"
    opacity="0.4"
  />
  <!-- Corner embellishments -->
  <line x1="100" y1="8" x2="100" y2="28" stroke="currentColor" stroke-width="1.5" opacity="0.8"/>
  <line x1="192" y1="100" x2="172" y2="100" stroke="currentColor" stroke-width="1.5" opacity="0.8"/>
  <line x1="100" y1="192" x2="100" y2="172" stroke="currentColor" stroke-width="1.5" opacity="0.8"/>
  <line x1="8" y1="100" x2="28" y2="100" stroke="currentColor" stroke-width="1.5" opacity="0.8"/>
  <!-- Rune cross -->
  <line x1="100" y1="40" x2="100" y2="160" stroke="currentColor" stroke-width="0.8" opacity="0.3"/>
  <line x1="40" y1="100" x2="160" y2="100" stroke="currentColor" stroke-width="0.8" opacity="0.3"/>
  <!-- Central rune diamond -->
  <polygon
    points="100,72 128,100 100,128 72,100"
    stroke="currentColor"
    stroke-width="1.2"
    fill="none"
    opacity="0.7"
  />
  <!-- Rune tick marks on inner diamond edges -->
  <line x1="136" y1="64" x2="146" y2="54" stroke="currentColor" stroke-width="1" opacity="0.5"/>
  <line x1="64" y1="64" x2="54" y2="54" stroke="currentColor" stroke-width="1" opacity="0.5"/>
  <line x1="136" y1="136" x2="146" y2="146" stroke="currentColor" stroke-width="1" opacity="0.5"/>
  <line x1="64" y1="136" x2="54" y2="146" stroke="currentColor" stroke-width="1" opacity="0.5"/>
  <!-- Center dot -->
  <circle cx="100" cy="100" r="3" fill="currentColor" opacity="0.8"/>
  <!-- Gothic arch top -->
  <path d="M80,72 Q100,52 120,72" stroke="currentColor" stroke-width="1" fill="none" opacity="0.5"/>
</svg>
