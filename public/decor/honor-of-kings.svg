<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Cloud-wave / lacquer-stroke motif (国潮 auspicious clouds) -->
  <!-- Top cloud wave -->
  <path
    d="M10,40 Q25,20 40,40 Q55,60 70,40 Q85,20 100,40 Q115,60 130,40 Q145,20 160,40 Q175,60 190,40"
    stroke="currentColor"
    stroke-width="1.8"
    fill="none"
    opacity="0.55"
  />
  <!-- Second cloud wave -->
  <path
    d="M10,56 Q25,36 40,56 Q55,76 70,56 Q85,36 100,56 Q115,76 130,56 Q145,36 160,56 Q175,76 190,56"
    stroke="currentColor"
    stroke-width="1.2"
    fill="none"
    opacity="0.3"
  />
  <!-- Bottom cloud wave -->
  <path
    d="M10,160 Q25,140 40,160 Q55,180 70,160 Q85,140 100,160 Q115,180 130,160 Q145,140 160,160 Q175,180 190,160"
    stroke="currentColor"
    stroke-width="1.8"
    fill="none"
    opacity="0.55"
  />
  <!-- Second bottom cloud wave -->
  <path
    d="M10,144 Q25,124 40,144 Q55,164 70,144 Q85,124 100,144 Q115,164 130,144 Q145,124 160,144 Q175,164 190,144"
    stroke="currentColor"
    stroke-width="1.2"
    fill="none"
    opacity="0.3"
  />
  <!-- Central medallion — double circle -->
  <circle cx="100" cy="100" r="36" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.6"/>
  <circle cx="100" cy="100" r="28" stroke="currentColor" stroke-width="0.8" fill="none" opacity="0.4"/>
  <!-- Inner radial spokes (八卦 echo) -->
  <line x1="100" y1="64" x2="100" y2="72" stroke="currentColor" stroke-width="1.5" opacity="0.7"/>
  <line x1="100" y1="128" x2="100" y2="136" stroke="currentColor" stroke-width="1.5" opacity="0.7"/>
  <line x1="64" y1="100" x2="72" y2="100" stroke="currentColor" stroke-width="1.5" opacity="0.7"/>
  <line x1="128" y1="100" x2="136" y2="100" stroke="currentColor" stroke-width="1.5" opacity="0.7"/>
  <line x1="75" y1="75" x2="81" y2="81" stroke="currentColor" stroke-width="1.5" opacity="0.7"/>
  <line x1="125" y1="75" x2="119" y2="81" stroke="currentColor" stroke-width="1.5" opacity="0.7"/>
  <line x1="75" y1="125" x2="81" y2="119" stroke="currentColor" stroke-width="1.5" opacity="0.7"/>
  <line x1="125" y1="125" x2="119" y2="119" stroke="currentColor" stroke-width="1.5" opacity="0.7"/>
  <!-- Center jewel -->
  <circle cx="100" cy="100" r="5" fill="currentColor" opacity="0.7"/>
  <!-- Gold border stroke accent -->
  <rect x="4" y="4" width="192" height="192" stroke="currentColor" stroke-width="2" fill="none" opacity="0.2"/>
  <rect x="10" y="10" width="180" height="180" stroke="currentColor" stroke-width="0.8" fill="none" opacity="0.15"/>
</svg>
